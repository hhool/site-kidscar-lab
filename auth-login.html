<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 Login - Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell nav">
        <a class="brand" href="index.html">Kidscar<span>Lab</span> Prototype</a>
        <nav class="nav-links">
          <a href="products.html">产品</a>
          <a href="reviews.html">评测</a>
          <a href="rankings.html">排名/最佳</a>
          <a href="news.html">资讯更新</a>
          <a href="about.html">关于与透明度</a>
          <a href="auth-register.html">注册</a>
          <a href="auth-login.html">登录</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      <section class="hero">
        <h1>用户登录 Login</h1>
        <p>原型阶段：用于验证导航与账号流程入口。下一步接入真实鉴权服务与会话管理。</p>
      </section>

      <section class="section">
        <h2>登录表单</h2>
        <div class="form-wrap">
          <form id="loginForm" novalidate>
            <div class="form-grid">
              <div class="field full">
                <label for="loginIdentifier">邮箱或手机号</label>
                <input id="loginIdentifier" type="text" placeholder="请输入邮箱或手机号" />
              </div>
              <div class="field full">
                <label for="loginPassword">密码</label>
                <input id="loginPassword" type="password" placeholder="请输入密码（至少6位）" />
              </div>
            </div>

            <div class="actions">
              <button class="btn primary" type="submit">登录</button>
              <a class="btn" href="auth-register.html">去注册</a>
            </div>

            <div id="loginError" class="error-text"></div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="shell">Auth login prototype page.</div></footer>
    <script src="i18n-pages.js"></script>
    <script src="script.js"></script>
  </body>
</html>
