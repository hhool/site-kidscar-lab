<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 Register - Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell nav">
        <a class="brand" href="index.html">Kidscar<span>Lab</span> Prototype</a>
        <nav class="nav-links">
          <a href="products.html">产品</a>
          <a href="reviews.html">评测</a>
          <a href="rankings.html">排名/最佳</a>
          <a href="news.html">资讯更新</a>
          <a href="about.html">关于与透明度</a>
          <a href="auth-register.html">注册</a>
          <a href="auth-login.html">登录</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      <section class="hero">
        <h1>用户注册 Register</h1>
        <p>原型阶段：展示注册入口与流程骨架。下一步接入邮箱/手机号校验与用户协议确认。</p>
      </section>

      <section class="section">
        <h2>注册表单</h2>
        <div class="form-wrap">
          <form id="registerForm" novalidate>
            <div class="form-grid">
              <div class="field">
                <label for="registerEmail">邮箱</label>
                <input id="registerEmail" type="email" placeholder="name@example.com" />
              </div>
              <div class="field">
                <label for="registerPhone">手机号</label>
                <input id="registerPhone" type="tel" placeholder="请输入手机号" />
              </div>
              <div class="field">
                <label for="registerPassword">密码</label>
                <input id="registerPassword" type="password" placeholder="至少6位" />
              </div>
              <div class="field">
                <label for="registerConfirm">确认密码</label>
                <input id="registerConfirm" type="password" placeholder="再次输入密码" />
              </div>
              <div class="field full">
                <label class="agree" for="registerAgree">
                  <input id="registerAgree" type="checkbox" />
                  我已阅读并同意用户协议与隐私政策
                </label>
              </div>
            </div>

            <div class="actions">
              <button class="btn primary" type="submit">注册并登录</button>
              <a class="btn" href="auth-login.html">已有账号去登录</a>
            </div>

            <div id="registerError" class="error-text"></div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="shell">Auth register prototype page.</div></footer>
    <script src="script.js"></script>
  </body>
</html>
