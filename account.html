<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户中心 Account - Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell nav">
        <a class="brand" href="index.html">Kidscar<span>Lab</span> Prototype</a>
        <nav class="nav-links">
          <a href="products.html">产品</a>
          <a href="reviews.html">评测</a>
          <a href="rankings.html">排名/最佳</a>
          <a href="news.html">资讯更新</a>
          <a href="about.html">关于与透明度</a>
          <a href="auth-register.html">注册</a>
          <a href="auth-login.html">登录</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      <section class="hero">
        <h1>用户中心 Account</h1>
        <p>
          当前登录用户：<strong id="accountName">-</strong>
          （状态：<span id="accountState">-</span>）
        </p>
      </section>

      <section class="section">
        <h2>模拟资料卡</h2>
        <div class="profile-card">
          <div class="profile-head">
            <h3 id="accountNameCard">账号信息</h3>
            <span id="accountBadge" class="profile-badge">-</span>
          </div>
          <div class="profile-meta">
            <div class="meta-item"><strong>邮箱</strong><span id="accountEmail">-</span></div>
            <div class="meta-item"><strong>手机号</strong><span id="accountPhone">-</span></div>
            <div class="meta-item"><strong>地区</strong><span id="accountRegion">-</span></div>
            <div class="meta-item"><strong>账号类型</strong><span>普通用户（模拟）</span></div>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>功能占位</h2>
        <div class="list">
          <div class="item"><strong>个人资料</strong><span>昵称、邮箱、手机号、地区</span></div>
          <div class="item"><strong>我的收藏</strong><span>收藏产品与关注评测</span></div>
          <div class="item"><strong>我的评分与评论</strong><span>用户评分记录与评论历史</span></div>
          <div class="item"><strong>通知中心</strong><span>评测更新、价格提醒、系统消息</span></div>
        </div>
      </section>
    </main>

    <footer class="footer"><div class="shell">Account prototype page.</div></footer>
    <script src="i18n-pages.js"></script>
    <script src="script.js"></script>
  </body>
</html>
